<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="BaoMiHua Agent Gateway - Mobile control hub for AI Coding Agents" />
    <meta name="theme-color" content="#13051b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BaoMiHua" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>BaoMiHua - Agent Gateway</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker 注册：仅在生产环境启用，避免开发期间被 SW 缓存干扰。
      // 带 ?nosw 参数时跳过注册（用于调试或卡死恢复）。
      if ('serviceWorker' in navigator && location.protocol !== 'file:' && !new URLSearchParams(location.search).has('nosw')) {
        // 开发服务器（vite dev）通常运行在非 80/443 端口且响应头不带 Cache-Control，
        // 这里使用 import.meta 不可用（纯 HTML），改用 hostname 判断：本机 dev 时也允许注册，
        // 因为本仓库 dev/preview/生产 都希望 SW 介入以便验证。
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => {
              // 每 60 分钟尝试一次更新检查
              setInterval(() => { registration.update().catch(() => {}); }, 60 * 60 * 1000);
              console.log('[SW] registered, scope:', registration.scope);
            },
            (err) => {
              console.warn('[SW] registration failed:', err);
            }
          );
        });
      }
    </script>
  </body>
</html>
