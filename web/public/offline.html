<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#13051b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BaoMiHua · 离线中</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #f3efff;
        --fg-dim: #b9b0d9;
        --bg-0: #13051b;
        --bg-1: #1d0d2a;
        --brand: #a78bfa;
        --accent: #22d3ee;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg-0);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: calc(24px + env(safe-area-inset-top));
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
      }
      .card {
        max-width: 440px;
        width: 100%;
        padding: 32px 28px;
        background: linear-gradient(180deg, rgba(167, 139, 250, 0.08), rgba(34, 211, 238, 0.04));
        border: 1px solid rgba(167, 139, 250, 0.18);
        border-radius: 20px;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6d4ad4, #22c8d4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
        font-weight: 600;
      }
      p {
        margin: 0 0 20px;
        font-size: 14px;
        line-height: 1.6;
        color: var(--fg-dim);
      }
      button {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        cursor: pointer;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #13051b;
        background: linear-gradient(135deg, #a78bfa, #22d3ee);
        transition: transform 120ms ease, opacity 120ms ease;
        min-width: 140px;
      }
      button:hover { opacity: 0.92; }
      button:active { transform: scale(0.98); }
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: var(--fg-dim);
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="icon">BM</div>
        <h1>当前处于离线状态</h1>
        <p>
          网络连接已断开，无法和后端 Agent 实时通信。<br />
          已有的会话历史仍然保存在本地，网络恢复后将自动同步。
        </p>
        <button onclick="location.href='/'">重新尝试</button>
        <div class="hint">若问题持续存在，请检查 Wi-Fi / 移动网络。</div>
      </div>
    </div>
  </body>
</html>
